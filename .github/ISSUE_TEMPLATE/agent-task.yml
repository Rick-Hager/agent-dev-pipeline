name: Agent Task
description: Create a task for the agent development pipeline
labels: []
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - feature
        - bugfix
        - refactor
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Brief description of what needs to be done.
      placeholder: Describe the task...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Each criterion must be clear and testable.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: technical-context
    attributes:
      label: Technical Context (optional)
      description: Relevant endpoints, database tables, existing components.
      placeholder: Any technical details that help the agent understand the task...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - alta
        - média
        - baixa
    validations:
      required: true
