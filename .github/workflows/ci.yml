name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: menuapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/menuapp_test?schema=public
      JWT_SECRET: test-jwt-secret-for-ci-only

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma db push

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Unit & Integration tests
        run: npm run test -- --coverage

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e

      - name: Report coverage
        continue-on-error: true
        run: |
          node -e "
            const json = JSON.parse(require('fs').readFileSync('coverage/json-summary.json', 'utf8'));
            const pct = json.total.lines.pct;
            console.log('Coverage: ' + pct + '%');
            if (pct < 80) {
              console.log('::warning::Coverage ' + pct + '% is below 80% target');
            }
          "
